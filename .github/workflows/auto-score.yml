name: Sync results &amp; odds
on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: auto-score
  cancel-in-progress: true
jobs:
  score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install --no-save @supabase/supabase-js@2 tsx
      - run: node scripts/auto-score.mjs
        env:
          SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      # Persist resolved knockout teams (after auto-score finalizes winners, before
      # fetch-football maps them to fixtures) so live scores flow for knockout rounds.
      - run: npx tsx scripts/resolve-knockout.ts --apply
        env:
          SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      # Override our projected knockout teams with API-Football's real fixtures —
      # the authoritative bracket. Fixes cases our own third-place allocation gets
      # wrong. Runs AFTER resolve-knockout (so it corrects a bad projection) and
      # BEFORE fetch-football (so enrichment uses the correct teams).
      - run: node scripts/reconcile-knockout-api.mjs --apply
        env:
          SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}
      - run: node scripts/fetch-odds.mjs
        env:
          SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      - run: node scripts/fetch-football.mjs
        env:
          SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}
